apiVersion: v1
kind: Namespace
metadata:
  name: target-zone
  labels:
    # Essential for Litmus Namespace scoping security
    chaos: target 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api-service
  namespace: target-zone
  labels:
    app: core-api-service
spec:
  # CHANGED: Raised to 2 or 3 replicas. If you kill a single replica (1/1), 
  # your auto-recovery report will instantly show complete outage downtime. 
  # Multiple replicas let you observe true high-availability and recovery convergence.
  replicas: 3 
  selector:
    matchLabels:
      app: core-api-service
  template:
    metadata:
      labels:
        app: core-api-service
    spec:
      containers:
      - name: web-app
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          limits:
            # OPTIMIZED: Litmus CPU stress hogs require a tiny bit of overhead clearance
            # to keep the underlying container runtime system responsive during faults.
            cpu: "200m"
            memory: "128Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: core-api-service
  namespace: target-zone
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30010 # FIXED: Changed from 30000 to avoid colliding with your frontend dashboard!
  selector:
    app: core-api-service